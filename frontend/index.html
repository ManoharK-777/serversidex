<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerSide X | Premium SaaS Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Poppins:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- Background Elements -->
    <canvas id="particleCanvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="dashboard-wrapper">
        <!-- Hero Header -->
        <header class="hero-header reveal">
            <div class="badge">v3.0 Premium Node Live</div>
            <h1 class="glitch-title" data-text="ServerSide X">ServerSide X</h1>
            <p class="subtitle">Where frontend experience meets backend intelligence.</p>
        </header>

        <!-- Main Dashboard Grid -->
        <main class="dashboard-grid reveal" style="transition-delay: 0.2s;">
            
            <!-- Left Panel: Widgets -->
            <aside class="dashboard-sidebar">
                
                <!-- Widget 1: Server Status -->
                <div class="glass-card widget-card tilt-element">
                    <div class="widget-header">
                        <span class="pulse-dot"></span>
                        <h3>System Status</h3>
                    </div>
                    <div class="widget-body center-flex">
                        <div class="status-ring">
                            <svg viewBox="0 0 100 100">
                                <defs>
                                    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="100%" y2="0%">
                                        <stop offset="0%" stop-color="#FF0000" />
                                        <stop offset="50%" stop-color="#FF4500" />
                                        <stop offset="100%" stop-color="#FFD700" />
                                    </linearGradient>
                                </defs>
                                <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                                <circle class="ring-progress" cx="50" cy="50" r="45"></circle>
                            </svg>
                            <div class="ring-text">
                                <span class="percent">99.9%</span>
                                <span class="label">Uptime</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Widget 2: Live Data Stream -->
                <div class="glass-card widget-card tilt-element">
                    <div class="widget-header">
                        <svg class="widget-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                        <h3>Live Traffic</h3>
                    </div>
                    <div class="widget-body">
                        <div class="terminal-window" id="terminalLog">
                            <!-- JS will populate logs here -->
                        </div>
                    </div>
                </div>

                <!-- Widget 3: Security -->
                <div class="glass-card widget-card tilt-element">
                    <div class="widget-header">
                        <svg class="widget-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
                        <h3>Security Protocol</h3>
                    </div>
                    <div class="widget-body flex-between">
                        <div class="sec-level">End-to-End Encryption</div>
                        <div class="sec-status active">ACTIVE</div>
                    </div>
                </div>
            </aside>

            <!-- Right Panel: Form -->
            <section class="form-section">
                <div class="glass-card main-form-card tilt-element">
                    <div class="card-header">
                        <h2>Initialize Connection</h2>
                        <p>Establish a secure comm-link with the mainframe.</p>
                    </div>
                    
                    <form id="contactForm">
                        <div class="input-group">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <input type="text" id="name" name="name" required autocomplete="off">
                            <label for="name">Identifier (Name)</label>
                            <div class="input-border"></div>
                        </div>

                        <div class="input-group">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <input type="email" id="email" name="email" required autocomplete="off">
                            <label for="email">Comm-Link (Email)</label>
                            <div class="input-border"></div>
                        </div>

                        <div class="input-group">
                            <svg class="input-icon textarea-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                            <textarea id="message" name="message" rows="4" required autocomplete="off"></textarea>
                            <label for="message">Transmission Payload</label>
                            <div class="input-border"></div>
                        </div>

                        <button type="submit" class="neon-btn" id="submitBtn">
                            <span class="btn-light-sweep"></span>
                            <span class="btn-text">Establish Link</span>
                            <div class="btn-loader"></div>
                        </button>
                        <div id="formMessage" class="form-message"></div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- JS -->
    <script src="./script.js"></script>
</body>
</html>
